name: Deploy to Trigger.dev

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Deploy to Trigger.dev
        run: npx trigger.dev@4.4.4 deploy
        env:
          TRIGGER_API_KEY: ${{ secrets.TRIGGER_API_KEY }}
